    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap');
        
        :root {
            --ios-bg: #000000;
            --ios-secondary-bg: #1c1c1e;
            --ios-tertiary-bg: #000000; 
            --ios-quaternary-bg: #000000; 
            --ios-blue: #0a84ff;
            --ios-green: #30d158;
            --ios-orange: #f97316;
            --ios-purple: #bf5af2;
            --ios-text: #ffffff;
            --ios-text-secondary: #d1d1d6; /* 明るいシルバー */
            --ios-separator: #71717a;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: var(--ios-bg); 
            font-size: 15px; 
            color: var(--ios-text); 
            min-height: 100vh;
            overscroll-behavior: none;
            font-variant-ligatures: none;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        input::placeholder {
            font-size: 14px !important; /* 最低フォントサイズ14px */
            color: #a1a1aa !important; /* 明るいシルバー */
            font-weight: 400;
        }
        
        .btn-3d { 
            transition: all 0.1s; 
            position: relative; 
            top: 0; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            font-weight: 700;
            border-bottom-width: 4px;
        }
        .btn-3d:active { transform: translateY(2px); border-bottom-width: 0 !important; }
        
        .btn-3d-orange { background-color: var(--ios-orange) !important; border-bottom-color: #9a3412 !important; }
        .btn-3d-blue { background-color: var(--ios-blue) !important; border-bottom-color: #005bb5 !important; }
        .btn-3d-zinc { background: #3f3f46; border-bottom-color: #18181b; }
        .btn-3d-silver { background: #d4d4d8; border-bottom-color: #71717a; color: #444; }
        .btn-3d-red { background: #dc2626; border-bottom-color: #7f1d1d; }
        .btn-3d-gray { background: #8e8e93; border-bottom-color: #636366; }
        .btn-3d-darkgray { background: #52525b; border-bottom-color: #3f3f46; }
        .btn-3d-indigo { background-color: #5E5CE6 !important; border-bottom-color: #3A38B1 !important; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .animate-fade-in { animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .ios-card-base { background: #1c1c1e; border-radius: 18px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); border: 1px solid #3a3a3c; }

        .canvas-container { border: 1px solid #38383a; border-radius: 12px; overflow: hidden; background-color: #000000; width: 100%; position: relative; }
        canvas { width: 100%; height: auto; display: block; }

        .alloc-input-field {
            background-color: #2c2c2e;
            border: 1px solid var(--ios-separator) !important;
            color: var(--ios-text);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%; 
            padding: 0.4rem 1rem; 
            font-size: 1.25rem; 
            text-align: center; 
            height: 2.8rem; 
            border-radius: 12px;
        }
        
        .toast-msg {
            position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); color: #000; padding: 14px 24px;
            border-radius: 999px; font-size: 16px; font-weight: 700;
            box-shadow: 0 10px 24px rgba(0,0,0,0.35); white-space: nowrap; z-index: 1000;
            pointer-events: none; transition: opacity 0.3s ease;
        }

        input[type="checkbox"].ios-checkbox {
            -webkit-appearance: none; appearance: none; background-color: #000; margin: 0; font: inherit; color: #5E5CE6; width: 1.5rem; height: 1.5rem; border: 2px solid var(--ios-separator); border-radius: 0.5rem; display: grid; place-content: center; cursor: pointer; transition: all 0.2s;
        }
        input[type="checkbox"].ios-checkbox:checked { background-color: #5E5CE6; border-color: #5E5CE6; }
        input[type="checkbox"].ios-checkbox::before { content: ""; width: 0.75rem; height: 0.75rem; transform: scale(0); transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        input[type="checkbox"].ios-checkbox:checked::before { transform: scale(1); }

        /* Slope Tab Styles */
        .label-ios-slope {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: bold;
            color: #d1d1d6; /* 明るいシルバー */
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const getStored = (key, fallback) => {
            const item = localStorage.getItem(key);
            try { return item ? JSON.parse(item) : fallback; } catch(e) { return fallback; }
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {
                undo: <path d="M3 7v6h6M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                rotate: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                x: <path d="M18 6 6 18M6 6l12 12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                plus: <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />,
                chevron: <path d="m6 9 6 6 6-6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                backspace: <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2zM18 9l-6 6M12 9l6 6" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />,
                enter: <path d="M9 10l-5 5 5 5M4 15h11a5 5 0 0 0 5-5V7" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" className={className} xmlns="http://www.w3.org/2000/svg">
                    {paths[name] || null}
                </svg>
            );
        };

        const AreaApp = ({ areaStateRef, savedData, setAreaSavedData, showToast }) => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const [areaValue, setAreaValue] = useState('--.--');
            const [modalValue, setModalValue] = useState('');
            const [isFirstInput, setIsFirstInput] = useState(true);
            const [slopeInput, setSlopeInput] = useState(''); // 初期値を40から未入力に変更
            const [slopeDeg, setSlopeDeg] = useState('0.0°'); // 初期値を角度変更
            const [baseInput, setBaseInput] = useState(''); 
            const [hypotenuseValue, setHypotenuseValue] = useState('-'); 
            const [activeInputTarget, setActiveInputTarget] = useState('slope'); 
            const [activeTab, setActiveTab] = useState('draw'); 
            const [updateTrigger, setUpdateTrigger] = useState(0);

            // Slope Tab States
            const [slopeY, setSlopeY] = useState('');
            const [slopeX, setSlopeX] = useState('');
            const [slopeC, setSlopeC] = useState('');
            const [slopeA, setSlopeA] = useState('');
            const [slopeB, setSlopeB] = useState('');
            const [slopeActiveField, setSlopeActiveField] = useState('y');
            const [slopeIsNewEntry, setSlopeIsNewEntry] = useState(true);
            
            const s = areaStateRef.current;
            const themeColor = activeInputTarget === 'angle' ? '#30d158' : '#5E5CE6';

            const historyTotals = useMemo(() => {
                let checkedTotal = 0;
                let grandTotal = 0;
                savedData.forEach(item => {
                    const val = parseFloat(item.area) || 0;
                    grandTotal += val;
                    if (item.checked) checkedTotal += val;
                });
                return { checked: checkedTotal.toFixed(2), all: grandTotal.toFixed(2) };
            }, [savedData]);

            // Helper functions for slope
            const unformat = (val) => val.toString().replace(/,/g, '');
            const toNum = (val) => parseFloat(unformat(val)) || 0;
            const formatNum = (val) => {
                if (val === '' || val === undefined || val === null) return '';
                const clean = val.toString().replace(/,/g, '');
                const num = parseFloat(clean);
                return isNaN(num) ? val : Math.round(num).toLocaleString();
            };
            const formatSlopeValue = (num) => {
                if (num === '' || num === null || num === undefined || Number.isNaN(num)) return '';
                return Math.round(num).toString();
            };
            const formatAngleValue = (num) => {
                if (num === '' || num === null || num === undefined || Number.isNaN(num)) return '';
                return (Math.round(num * 10) / 10).toFixed(1);
            };

            const handleSlopeCalcChange = (field, val) => {
                const cleanVal = unformat(val);
                if (field === 'y') {
                    setSlopeY(cleanVal);
                    const n = parseFloat(cleanVal);
                    if (isNaN(n) || cleanVal === '') { setSlopeX(''); return; }
                    setSlopeX(formatAngleValue((Math.atan(n / 100) * 180) / Math.PI));
                    updateOtherSlopeFields('y', n, cleanVal, slopeX, slopeC, slopeA, slopeB);
                } else if (field === 'x') {
                    setSlopeX(cleanVal);
                    const n = parseFloat(cleanVal);
                    if (isNaN(n) || cleanVal === '') { setSlopeY(''); return; }
                    const nY = 100 * Math.tan((n * Math.PI) / 180);
                    setSlopeY(formatSlopeValue(nY));
                    updateOtherSlopeFields('y', nY, formatSlopeValue(nY), cleanVal, slopeC, slopeA, slopeB);
                } else if (field === 'c') {
                    setSlopeC(cleanVal);
                    const n = parseFloat(cleanVal);
                    if (isNaN(n) || cleanVal === '') return;
                    updateOtherSlopeFields('c', n, slopeY, slopeX, cleanVal, slopeA, slopeB);
                } else if (field === 'a') {
                    setSlopeA(cleanVal);
                    const n = parseFloat(cleanVal);
                    if (isNaN(n) || cleanVal === '') return;
                    updateOtherSlopeFields('a', n, slopeY, slopeX, slopeC, cleanVal, slopeB);
                } else if (field === 'b') {
                    setSlopeB(cleanVal);
                    const n = parseFloat(cleanVal);
                    if (isNaN(n) || cleanVal === '') return;
                    updateOtherSlopeFields('b', n, slopeY, slopeX, slopeC, slopeA, cleanVal);
                }
            };

            const updateOtherSlopeFields = (changedField, changedValue, currentYStr, currentXStr, currentCStr, currentAStr, currentBStr) => {
                const curY = changedField === 'y' ? changedValue : toNum(currentYStr);
                const curC = changedField === 'c' ? changedValue : toNum(currentCStr);
                const curA = changedField === 'a' ? changedValue : toNum(currentAStr);
                const curB = changedField === 'b' ? changedValue : toNum(currentBStr);
                const hasLockedC = (changedField === 'c') ? true : currentCStr !== '';

                if (hasLockedC) {
                    if ((changedField === 'y' || changedField === 'c') && !isNaN(curY)) {
                        const nextA = curC * (curY / 100);
                        const nextB = Math.sqrt(curC**2 + nextA**2);
                        setSlopeA(Math.round(nextA).toString());
                        setSlopeB(Math.round(nextB).toString());
                        return;
                    }
                    if (changedField === 'a') {
                        if (curC !== 0 && !isNaN(curA)) {
                            const calcY = (curA / curC) * 100;
                            setSlopeY(formatSlopeValue(calcY));
                            setSlopeX(formatAngleValue((Math.atan(calcY / 100) * 180) / Math.PI));
                            setSlopeB(Math.round(Math.sqrt(curC**2 + curA**2)).toString());
                        } else setSlopeB('');
                        return;
                    }
                    if (changedField === 'b') {
                        if (!isNaN(curB) && curB >= curC) {
                            const calcA = Math.sqrt(Math.max(0, curB**2 - curC**2));
                            setSlopeA(Math.round(calcA).toString());
                            const calcY = curC === 0 ? 0 : (calcA / curC) * 100;
                            setSlopeY(formatSlopeValue(calcY));
                            setSlopeX(formatAngleValue((Math.atan(calcY / 100) * 180) / Math.PI));
                        } else { setSlopeA(''); setSlopeY(''); setSlopeX(''); }
                        return;
                    }
                }

                if (currentYStr !== '' || changedField === 'y') {
                    const calcY = curY;
                    if (changedField === 'a') {
                        if (calcY !== 0) {
                            const calcC = curA / (calcY / 100);
                            setSlopeC(Math.round(calcC).toString());
                            setSlopeB(Math.round(Math.sqrt(calcC**2 + curA**2)).toString());
                        }
                    } else if (changedField === 'b') {
                        const calcC = curB / Math.sqrt(1 + (calcY / 100)**2);
                        setSlopeC(Math.round(calcC).toString());
                        setSlopeA(Math.round(calcC * (calcY / 100)).toString());
                    }
                } else if (changedField === 'a' && currentBStr !== '') {
                    if (curB > curA) {
                        const calcC = Math.sqrt(curB**2 - curA**2);
                        setSlopeC(Math.round(calcC).toString());
                        const calcY = (curA / calcC) * 100;
                        setSlopeY(formatSlopeValue(calcY));
                        setSlopeX(formatAngleValue((Math.atan(calcY / 100) * 180) / Math.PI));
                    }
                } else if (changedField === 'b' && currentAStr !== '') {
                    if (curB > curA) {
                        const calcC = Math.sqrt(curB**2 - curA**2);
                        setSlopeC(Math.round(calcC).toString());
                        const calcY = (curA / calcC) * 100;
                        setSlopeY(formatSlopeValue(calcY));
                        setSlopeX(formatAngleValue((Math.atan(calcY / 100) * 180) / Math.PI));
                    }
                }
            };

            const handleSlopeKeypad = (key) => {
                if (key === 'AC') {
                    setSlopeY(''); setSlopeX(''); setSlopeC(''); setSlopeA(''); setSlopeB('');
                    setSlopeIsNewEntry(true);
                    return;
                }
                if (key === 'C') {
                    const setter = { y: setSlopeY, x: setSlopeX, c: setSlopeC, a: setSlopeA, b: setSlopeB }[slopeActiveField];
                    if (setter) setter('');
                    setSlopeIsNewEntry(true);
                    return;
                }
                if (key === '⏎') {
                    const fields = ['y', 'x', 'c', 'a', 'b'];
                    const idx = fields.indexOf(slopeActiveField);
                    setSlopeActiveField(fields[(idx + 1) % fields.length]);
                    setSlopeIsNewEntry(true);
                    return;
                }
                let currentStr = (
                    slopeActiveField === 'y' ? slopeY :
                    slopeActiveField === 'x' ? slopeX :
                    slopeActiveField === 'c' ? slopeC :
                    slopeActiveField === 'a' ? slopeA :
                    slopeB
                ).toString();
                if (key === '00' && (slopeIsNewEntry || currentStr === '')) return;
                if (key === '.' && !slopeIsNewEntry && currentStr.includes('.')) return;
                let nextStr = slopeIsNewEntry ? (key === '.' ? '0.' : key.toString()) : currentStr + key;
                setSlopeIsNewEntry(false);
                handleSlopeCalcChange(slopeActiveField, nextStr);
            };

            // Drawing logic
            const getRawCoords = (e) => {
                if(!canvasRef.current) return {x:0, y:0};
                const rect = canvasRef.current.getBoundingClientRect();
                const t = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
                return { x: t.clientX - rect.left, y: t.clientY - rect.top };
            };
            const w2s = (w) => ({ x: w.x * s.zoom + s.cameraX, y: w.y * s.zoom + s.cameraY });
            const s2w = (s_coord) => ({ x: (s_coord.x - s.cameraX) / s.zoom, y: (s_coord.y - s.cameraY) / s.zoom });
            
            const distToSegment = (p, v, w) => {
                const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
                if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
                let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
                return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
            };

            const saveState = () => {
                s.actionHistory.push({
                    points: JSON.parse(JSON.stringify(s.points)), manualLengths: {...s.manualLengths}, 
                    fixedAngles: {...s.fixedAngles}, isClosed: s.isClosed, ppx: s.ppx, 
                    globalBaseAngle: s.globalBaseAngle, globalIsCW: s.globalIsCW, updateCount: s.updateCount
                });
                if (s.actionHistory.length > 50) s.actionHistory.shift();
            };

            const undo = () => {
                if (s.actionHistory.length === 0) return;
                const state = s.actionHistory.pop();
                s.points = state.points; s.manualLengths = state.manualLengths; s.fixedAngles = state.fixedAngles; 
                s.isClosed = state.isClosed; s.ppx = state.ppx; s.globalBaseAngle = state.globalBaseAngle; 
                s.globalIsCW = state.globalIsCW; s.updateCount = state.updateCount || 0;
                rebuildGeometry(false);
                draw();
            };

            const getActualAngle = (idx) => {
                const prev = s.points[(idx - 1 + s.points.length) % s.points.length];
                const curr = s.points[idx];
                const next = s.points[(idx + 1) % s.points.length];
                if (!prev || !curr || !next) return 0;
                const angIn = Math.atan2(curr.y - prev.y, curr.x - prev.x);
                const angOut = Math.atan2(next.y - curr.y, next.x - curr.x);
                let turn = angOut - angIn;
                while (turn <= -Math.PI) turn += Math.PI * 2;
                while (turn > Math.PI) turn -= Math.PI * 2;
                let actualD = s.globalIsCW ? (180 - turn * 180 / Math.PI) : (180 + turn * 180 / Math.PI);
                while (actualD <= 0) actualD += 360;
                while (actualD > 360) actualD -= 360;
                return actualD;
            };

            const rebuildGeometry = (shouldFit = false) => {
                if (s.points.length < 3 || !s.isClosed) { setAreaValue('--.--'); return; }
                const startAnchor = { x: s.points[0].x, y: s.points[0].y };
                let logical = new Array(s.points.length); logical[0] = {x: 0, y: 0}; let curAngle = 0;
                for (let i = 0; i < s.points.length - 1; i++) {
                    let len = s.manualLengths[i] !== undefined ? s.manualLengths[i] : (Math.hypot(s.points[i+1].x - s.points[i].x, s.points[i+1].y - s.points[i].y) / s.ppx);
                    if (len < 0.01) len = 0.01;
                    logical[i+1] = { x: logical[i].x + len * Math.cos(curAngle), y: logical[i].y + len * Math.sin(curAngle) };
                    if (i < s.points.length - 2) {
                        if (s.fixedAngles[i+1] !== undefined) curAngle += (s.globalIsCW ? (180 - s.fixedAngles[i+1]) : -(180 - s.fixedAngles[i+1])) * Math.PI / 180;
                        else {
                            const a1 = Math.atan2(s.points[i+1].y - s.points[i].y, s.points[i+1].x - s.points[i].x);
                            const a2 = Math.atan2(s.points[i+2].y - s.points[i+1].y, s.points[i+2].x - s.points[i+1].x);
                            let turn = a2 - a1; while (turn < -Math.PI) turn += Math.PI * 2; while (turn > Math.PI) turn -= Math.PI * 2; curAngle += turn;
                        }
                    }
                }
                const rot = s.globalBaseAngle - Math.atan2(logical[1].y - logical[0].y, logical[1].x - logical[0].x);
                for (let i = 0; i < logical.length; i++) {
                    const p = logical[i];
                    s.points[i] = { x: (p.x * Math.cos(rot) - p.y * Math.sin(rot)) * s.ppx + startAnchor.x, y: (p.x * Math.sin(rot) + p.y * Math.cos(rot)) * s.ppx + startAnchor.y };
                }
                let area = 0;
                for (let i = 0; i < s.points.length; i++) {
                    const p1 = s.points[i], p2 = s.points[(i + 1) % s.points.length];
                    area += p1.x * p2.y - p2.x * p1.y;
                }
                setAreaValue(Math.abs(area / (2 * s.ppx * s.ppx)).toFixed(2));
                
                if (shouldFit && canvasRef.current) {
                    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                    s.points.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); });
                    const pad = 40; 
                    s.zoom = Math.min((canvasRef.current.width - pad * 2) / (maxX - minX || 1), (canvasRef.current.height - pad * 2) / (maxY - minY || 1));
                    s.cameraX = canvasRef.current.width / 2 - ((minX + maxX) / 2) * s.zoom;
                    s.cameraY = canvasRef.current.height / 2 - ((minY + maxY) / 2) * s.zoom;
                }
                setUpdateTrigger(p => p + 1);
            };

            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                                    <button onClick={undo} className="btn-3d btn-3d-zinc px-3 h-9 text-white text-[13px] font-bold rounded-lg"><Icon name="undo" size={14} className="mr-1"/>戻る</button>
                                    <button onClick={() => rotateDrawing(90)} className="btn-3d btn-3d-zinc px-3 h-9 text-white text-[13px] font-bold rounded-lg"><Icon name="rotate" size={14} className="mr-1"/>回転</button>
                                </div>
                                <button onClick={() => {rebuildGeometry(true); draw();}} className="btn-3d btn-3d-silver px-3 h-9 text-[#444] text-[14px] font-bold rounded-lg">全体</button>
                            </div>
                            
                            <div className="ios-card-base px-3 py-2 flex flex-col gap-2 shrink-0 shadow-lg">
                                <div className="flex items-center gap-2 w-full">
                                    <div className="flex items-center justify-center shrink-0">
                                        <svg width="40" height="30" viewBox="4 4 56 44" className="text-zinc-300">
                                            <path d="M10 28 L54 28 L54 8" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/>
                                            <path d="M10 28 L54 8" fill="none" stroke="currentColor" strokeWidth="2.5" strokeDasharray="5,5" strokeLinecap="round"/>
                                            <text x="32" y="46" fontSize="18" textAnchor="middle" fontWeight="900" fill="currentColor">100</text>
                                        </svg>
                                    </div>
                                    <div onClick={() => selectInputTarget('slope')} className={`alloc-input-field flex-1 !text-left !px-3 !h-9 !text-[14px] cursor-pointer flex items-center bg-[#2c2c2e] border-2 ${activeInputTarget === 'slope' ? '!border-[#ff9f0a]' : '!border-zinc-700'}`}>
                                        {slopeInput ? slopeInput : <span className="text-zinc-300 font-normal">勾配100</span>}
                                    </div>
                                    <div className="flex items-center justify-center min-w-[64px] bg-[#2c2c2e] border border-zinc-700 h-9 rounded-lg shadow-sm px-1 text-white font-bold text-[14px]"> {slopeDeg} </div>
                                </div>
                            </div>

                            <div className="ios-card-base px-3 py-2 flex flex-col gap-1.5 shrink-0 shadow-lg border-2 transition-colors" style={{ borderColor: themeColor, backgroundColor: '#1a1a1c' }}>
                                <div className="flex justify-between items-center px-1">
                                    <h2 className="text-[14px] font-bold text-white flex items-center gap-2">
                                        <div className="w-2 h-2 rounded-full animate-pulse" style={{ backgroundColor: themeColor }}></div>
                                        {activeInputTarget === 'slope' ? '勾配の入力' : activeInputTarget === 'edge' ? '辺寸法の入力' : '角度の入力'}
                                    </h2>
                                </div>
                                <div className="relative mb-1">
                                    <div className={`w-full text-center text-[26px] font-bold bg-[#2c2c2e] text-white h-12 rounded-lg flex items-center justify-center border-2 transition-colors`} style={{ borderColor: isFirstInput ? themeColor : 'transparent' }}>
                                        {modalValue || '0'}
                                    </div>
                                    <span className="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 font-bold text-[16px] pointer-events-none">{activeInputTarget === 'slope' ? '' : activeInputTarget === 'angle' ? '°' : 'm'}</span>
                                </div>
                                {activeInputTarget === 'angle' && (
                                    <div className="grid grid-cols-3 gap-1.5 mt-0.5">
                                        <button onClick={() => handlePresetClick('90')} className="py-2 bg-[#2c2c2e] text-white rounded-md font-bold btn-3d btn-3d-zinc text-[14px]">90°</button>
                                        <button onClick={() => handlePresetClick('270')} className="py-2 bg-[#2c2c2e] text-white rounded-md font-bold btn-3d btn-3d-zinc text-[14px]">270°</button>
                                        <button onClick={() => handlePresetClick('45')} className="py-2 bg-[#2c2c2e] text-white rounded-md font-bold btn-3d btn-3d-zinc text-[14px]">45°</button>
                                    </div>
                                )}
                                <div className="flex gap-1.5">
                                    <div className="grid grid-cols-3 gap-1.5 flex-[3]">
                                        {['7','8','9','4','5','6','1','2','3','0','00','.'].map(key => (
                                            <button key={key} onClick={() => handleNumpadClick(key)} className="bg-[#2c2c2e] text-white rounded-md font-bold text-[20px] btn-3d btn-3d-zinc flex items-center justify-center active:bg-[#3a3a3c] transition-colors" style={{ height: '58px' }}> {key} </button>
                                        ))}
                                    </div>
                                    <div className="flex flex-col gap-1.5 flex-[1]">
                                        <button onClick={() => handleNumpadClick('CLEAR')} className="flex-[1] text-white rounded-md font-bold btn-3d btn-3d-darkgray flex items-center justify-center text-[14px]" style={{ height: '58px' }}> クリア </button>
                                        <button onClick={resetDrawing} className="flex-[1] text-white rounded-md font-bold btn-3d btn-3d-red flex items-center justify-center text-[14px]" style={{ height: '58px' }}> リセット </button>
                                        <button onClick={executeUpdate} className="flex-[2] text-white rounded-md font-bold btn-3d btn-3d-blue flex items-center justify-center text-[14px]" style={{ minHeight: '122px' }}> 作図 </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex-1 flex flex-col h-[50vh] md:h-auto md:min-h-[500px]">
                            <div className="flex justify-between items-center mb-3 shrink-0">
                                <div className="bg-[#5E5CE6] text-white px-4 h-12 flex items-center gap-2 rounded-xl shadow-lg">
                                    <span className="text-[14px] font-bold opacity-80">面積</span> 
                                    <span className="text-2xl font-bold leading-none">{areaValue}</span> 
                                    <span className="text-[14px] font-bold opacity-80">m²</span>
                                </div>
                                <button onClick={exportDrawing} className="h-12 px-5 btn-3d btn-3d-orange text-white text-[14px] font-bold rounded-xl shadow-lg flex items-center justify-center"> 履歴に保存 </button>
                            </div>

                            <div className="canvas-container relative shadow-2xl bg-[#1c1c1e] flex flex-col rounded-2xl overflow-hidden border border-[#38383a] flex-1" ref={containerRef}>
                                <div className="absolute inset-0 opacity-20 pointer-events-none" style={{backgroundImage: 'radial-gradient(#FFFFFF 1px, transparent 1px)', backgroundSize: '32px 32px'}}></div>
                                <canvas ref={canvasRef} className="w-full h-full block touch-none cursor-crosshair flex-1"></canvas>
                            </div>
                        </div>
                    </div>

                    <div className={`flex flex-col gap-4 ${activeTab === 'history' ? '' : 'hidden'}`}>
                        <div className="ios-card-base overflow-hidden shadow-xl border border-zinc-800 flex flex-col">
                            <div className="bg-[#2c2c2e] p-2.5 flex justify-between items-center border-b border-zinc-700 shrink-0">
                                <h2 className="text-[14px] font-bold text-white uppercase tracking-widest">保存済み 面積履歴</h2>
                            </div>
                            
                            <div className="bg-[#111111] px-3 py-2 border-b border-zinc-700 flex justify-around items-center shrink-0">
                                <div className="text-center">
                                    <p className="text-[14px] text-zinc-300 font-bold uppercase mb-0.5">チェック合計</p>
                                    <p className="text-[17px] font-black text-[#30d158]">{historyTotals.checked} <span className="text-[14px] font-bold">m²</span></p>
                                </div>
                                <div className="w-[1px] h-6 bg-zinc-700"></div>
                                <div className="text-center">
                                    <p className="text-[14px] text-zinc-300 font-bold uppercase mb-0.5">全合計</p>
                                    <p className="text-[17px] font-black text-white">{historyTotals.all} <span className="text-[14px] font-bold">m²</span></p>
                                </div>
                            </div>

                            <div className="p-3 bg-[#1c1c1e]">
                                {savedData.length === 0 ? <div className="text-center text-zinc-300 py-10 font-bold italic text-[14px]">履歴なし</div> : 
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {savedData.slice().reverse().map((data, idx) => renderHistoryItem(data, idx))}
                                    </div>
                                }
                            </div>
                        </div>
                    </div>

                    {/* Slope Tab */}
                    <div className={`flex flex-col md:flex-row gap-6 animate-fade-in ${activeTab === 'slope_calc' ? '' : 'hidden'}`}>
                        <div className="w-full md:w-[380px] flex flex-col gap-4">
                            <div className="ios-card-base overflow-hidden border-2 border-zinc-700 shadow-xl flex flex-col">
                                <div className="flex border-b border-zinc-700 relative h-14">
                                    <div className={`relative flex-1 flex flex-col justify-center transition-all ${slopeActiveField === 'y' ? 'bg-[#2c2c2e] ring-2 ring-inset ring-orange-500 z-10' : ''}`} onClick={() => {setSlopeActiveField('y'); setSlopeIsNewEntry(true);}}>
                                        <input type="text" readOnly value={slopeY} className="w-full h-full bg-transparent text-center text-[22px] text-white font-bold outline-none font-mono" placeholder="勾配" />
                                        <span className="label-ios-slope">
                                            {/* 三角形の大きさは変えず、底辺に100を追記 */}
                                            <svg width="32" height="24" viewBox="0 0 40 40" className="text-zinc-300 overflow-visible">
                                                <path d="M 5 20 L 35 20 L 35 5 Z" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                                                <text x="20" y="34" fontSize="12" textAnchor="middle" fill="currentColor" fontWeight="bold">100</text>
                                            </svg>
                                        </span>
                                    </div>
                                    <div className="w-[1px] h-full bg-zinc-700"></div>
                                    <div className={`relative flex-1 flex flex-col justify-center transition-all ${slopeActiveField === 'x' ? 'bg-[#2c2c2e] ring-2 ring-inset ring-orange-500 z-10' : ''}`} onClick={() => {setSlopeActiveField('x'); setSlopeIsNewEntry(true);}}>
                                        <input type="text" readOnly value={slopeX} className="w-full h-full bg-transparent text-center text-[22px] text-white font-bold outline-none font-mono" placeholder="角度" />
                                        <span className="label-ios-slope">
                                            <svg width="24" height="24" viewBox="0 0 24 24" className="text-zinc-300">
                                                <path d="M 4 20 L 20 20 M 4 20 L 18 8" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                                                <path d="M 12 20 A 8 8 0 0 0 10 15" fill="none" stroke="currentColor" strokeWidth="1.5" />
                                                <circle cx="11" cy="13" r="1.2" fill="currentColor" />
                                            </svg>
                                        </span>
                                    </div>
                                </div>
                                <div className={`relative px-3 h-16 border-b border-zinc-700 flex flex-col justify-center transition-all ${slopeActiveField === 'c' ? 'bg-[#2c2c2e] ring-2 ring-inset ring-orange-500 z-10' : ''}`} onClick={() => {setSlopeActiveField('c'); setSlopeIsNewEntry(true);}}>
                                    <span className="label-ios-slope text-[14px] opacity-80">水平寸法</span>
                                    <input type="text" readOnly value={formatNum(slopeC)} className="w-full h-full bg-transparent text-center text-[28px] text-white font-black outline-none font-mono pt-1" placeholder="水平の長さ" />
                                    <span className="absolute right-3 top-1/2 -translate-y-1/2 mt-1 text-zinc-300 font-bold text-[14px]">㎜</span>
                                </div>
                                
                                <div className="grid grid-cols-4 bg-[#27272a] overflow-hidden">
                                    {[7, 8, 9, 'C', 4, 5, 6, 'AC', 1, 2, 3, '⏎', 0, '00', '.'].map((key, i) => {
                                        const isEnter = key === '⏎';
                                        const isGray = key === 'C' || key === 'AC';
                                        const bgClass = isEnter ? 'btn-3d-orange text-white' : isGray ? 'bg-[#3f3f46] text-white' : 'bg-[#18181b] text-white';
                                        return (
                                            <button key={i} onClick={(e) => { e.preventDefault(); handleSlopeKeypad(key); }} className={`flex items-center justify-center text-[22px] font-bold h-16 border-r border-b border-zinc-700 active:opacity-60 ${bgClass} ${isEnter ? 'row-span-2 h-auto' : ''}`}>
                                                {isEnter ? <Icon name="enter" size={24} /> : key}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div className={`ios-card-base py-2 px-3 flex flex-col items-start border-2 transition-all relative cursor-pointer ${slopeActiveField === 'a' ? 'border-orange-500 ring-2 ring-inset ring-orange-500' : 'border-green-500'}`} onClick={() => {setSlopeActiveField('a'); setSlopeIsNewEntry(true);}}>
                                    <span className="text-[14px] font-bold text-zinc-300 uppercase leading-none mt-1">勾配幅</span>
                                    <div className="flex items-center w-full mt-1 relative h-10">
                                        <input type="text" readOnly value={formatNum(slopeA)} className={`w-full bg-transparent text-[26px] font-mono font-black outline-none ${slopeActiveField === 'a' ? 'text-white' : 'text-green-500'}`} placeholder="0" />
                                        <span className="text-[14px] font-bold text-zinc-300 absolute right-0 bottom-1">㎜</span>
                                    </div>
                                </div>
                                <div className={`ios-card-base py-2 px-3 flex flex-col items-start border-2 transition-all relative cursor-pointer ${slopeActiveField === 'b' ? 'border-orange-500 ring-2 ring-inset ring-orange-500' : 'border-blue-500'}`} onClick={() => {setSlopeActiveField('b'); setSlopeIsNewEntry(true);}}>
                                    <span className="text-[14px] font-bold text-zinc-300 uppercase leading-none mt-1">斜辺</span>
                                    <div className="flex items-center w-full mt-1 relative h-10">
                                        <input type="text" readOnly value={formatNum(slopeB)} className={`w-full bg-transparent text-[26px] font-mono font-black outline-none ${slopeActiveField === 'b' ? 'text-white' : 'text-blue-500'}`} placeholder="0" />
                                        <span className="text-[14px] font-bold text-zinc-300 absolute right-0 bottom-1">㎜</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col min-h-[300px]">
                            <div className="ios-card-base p-6 border border-zinc-700 shadow-2xl flex-1 flex flex-col">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2 font-bold text-zinc-200 text-[15px] uppercase tracking-widest">
                                        <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                        勾配プレビュー
                                    </div>
                                    <svg width="80" height="50" viewBox="0 0 80 50" className="text-zinc-300 overflow-visible">
                                        <path d="M 10 35 L 60 35 L 60 10 Z" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                                        <text x="35" y="48" fontSize="14" textAnchor="middle" fill="currentColor" fontWeight="bold">100</text>
                                        <text x="65" y="25" fontSize="14" textAnchor="start" fill="currentColor" fontWeight="bold">{slopeY || 'y'}</text>
                                    </svg>
                                </div>
                                <div className="flex-1 flex justify-center items-center bg-black/40 rounded-2xl border border-zinc-800">
                                    <svg viewBox="0 0 320 200" className="w-full h-full max-h-[320px] p-6 overflow-visible">
                                        <path d="M 40 160 L 260 160" stroke="#f97316" strokeWidth="5" strokeLinecap="round" fill="none" />
                                        <text x="150" y="190" fill="#fb923c" fontSize="20" textAnchor="middle" fontWeight="black">{formatNum(slopeC) || '-'}</text>
                                        {isSlopeValid && (
                                            <g>
                                                <path d={`M 260 160 L 260 ${160 - Math.max(15, Math.min(120, (toNum(slopeY)||0)))}`} stroke="#22c55e" strokeWidth="5" strokeLinecap="round" fill="none" />
                                                <text x="275" y={160 - (Math.max(15, Math.min(120, (toNum(slopeY)||0))) / 2)} fill="#4ade80" fontSize="20" dominantBaseline="middle" fontWeight="black">{(toNum(slopeY)||0) !== 0 ? formatNum(slopeA) : '-'}</text>
                                                <path d={`M 40 160 L 260 ${160 - Math.max(15, Math.min(120, (toNum(slopeY)||0)))}`} stroke="#3b82f6" strokeWidth="5" strokeLinecap="round" fill="none" />
                                                <text x="130" y={160 - (Math.max(15, Math.min(120, (toNum(slopeY)||0))) / 2) - 20} fill="#60a5fa" fontSize="20" textAnchor="middle" fontWeight="black" style={{ filter: 'drop-shadow(0px 0px 3px rgba(0,0,0,0.8))' }}>{(toNum(slopeY)||0) !== 0 ? formatNum(slopeB) : '-'}</text>
                                            </g>
                                        )}
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [toastMsg, setToastMsg] = useState('');
            const showToast = useCallback((msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 1800); }, []);

            const areaStateRef = useRef({
                points: [], manualLengths: {}, fixedAngles: {}, isClosed: false, selectedIdx: -1, activeMode: 'edge', ppx: 60,
                actionHistory: [], cameraX: 0, cameraY: 0, zoom: 1.0, isPanning: false, lastRawPos: {x: 0, y: 0}, startRawPos: {x: 0, y: 0}, hasMoved: false,
                globalBaseAngle: 0, globalIsCW: true, initialPinchDist: null, initialZoom: 1, initialPinchCenter: null, updateCount: 0,
            });
            const [areaSavedData, setAreaSavedData] = useState(() => getStored('area_calc_data_v20_ipad', []));

            return (
                <div className="flex flex-col bg-black min-h-screen">
                    {toastMsg && <div className="toast-msg" style={{opacity: 1}}>{toastMsg}</div>}
                    <header className="px-4 sm:px-6 py-3 flex items-center justify-between border-b border-zinc-800 bg-[#111] z-[100] shadow-md sticky top-0">
                        <div className="flex items-center">
                            <h1 className="text-[18px] sm:text-[20px] font-bold text-white whitespace-nowrap tracking-tight uppercase">面積計算</h1>
                        </div>
                        <div className="text-[14px] text-zinc-300 font-bold tracking-wider">KYOWA ROOF</div>
                    </header>

                    <main className="flex-1 p-4 sm:p-6 bg-black">
                        <div className="max-w-7xl mx-auto w-full">
                            <div className="animate-fade-in">
                                <AreaApp areaStateRef={areaStateRef} savedData={areaSavedData} setAreaSavedData={setAreaSavedData} showToast={showToast} />
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((registration) => registration.update().catch(() => {}))
        .catch((error) => console.error('Service Worker registration failed:', error));
    });
  }
</script>

</body>
</html>
