<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>面積計算アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            background-color: #000000; 
            color: #FFFFFF;
            margin: 0;
            height: 100dvh; 
            font-size: 16px; 
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            position: fixed;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        
        canvas { 
            touch-action: none; 
            display: block; 
            width: 100%; 
            height: 100%; 
            cursor: crosshair;
            position: relative;
            z-index: 10;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .tab-bar { 
            background: #1C1C1E; 
            display: flex; 
            padding: calc(var(--safe-top) + 6px) 12px 6px 12px; 
            gap: 6px; 
            flex-shrink: 0;
            border-bottom: 1px solid #2C2C2E;
        }

        .tab-item { 
            flex: 1; 
            padding: 7px; 
            text-align: center; 
            font-weight: 800; 
            border-radius: 10px; 
            color: #8E8E93; 
            transition: all 0.2s; 
            font-size: 13px;
            background: #2C2C2E;
        }
        .tab-item.active { 
            background: #3A3A3C; 
            color: #FFFFFF; 
            box-shadow: 0 0 0 2px #FF9500;
        }

        header { background: #1C1C1E; flex-shrink: 0; }
        
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.9); 
            align-items: flex-start; 
            justify-content: center; 
            z-index: 200; 
            backdrop-filter: blur(15px); 
            padding-top: 5vh; 
        }
        .modal.active { display: flex; }
        
        .btn-tap { transition: transform 0.1s; cursor: pointer; display: flex; align-items: center; justify-content: center; border: none; }
        .btn-tap:active { transform: scale(0.94); opacity: 0.8; }
        
        .header-btn { 
            height: 34px; 
            padding: 0 10px; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: 800;
        }

        input[type="text"] {
            appearance: textfield;
            background: #2C2C2E;
            color: #FFFFFF;
            border: 1px solid #3A3A3C;
            font-size: 16px !important;
        }
        
        .canvas-area { 
            flex: 1; 
            position: relative; 
            background: #1C1C1E; 
            overflow: hidden; 
        }

        #gridBg {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#FFFFFF 1px, transparent 1px);
            background-size: 22.4px 22.4px; 
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }
        
        #pressProgress { 
            position: fixed; 
            top: 0; 
            left: 0; 
            height: 4px; 
            background: #5E5CE6; 
            z-index: 300; 
            width: 0; 
            opacity: 0; 
            transition: opacity 0.2s; 
            pointer-events: none; 
        }

        #historyView { overflow-y: auto; background: #000; padding: 12px; }
        .history-card { background: #1C1C1E; border-radius: 18px; padding: 14px; margin-bottom: 12px; border: 1px solid #2C2C2E; }
        .memo-input { width: 100%; background: transparent; border: none; color: #8E8E93; font-size: 14px; margin-bottom: 8px; font-weight: bold; }

        .bg-system-indigo { background-color: #5E5CE6; }
        .bg-system-gray { background-color: #2C2C2E; color: #FFFFFF; }
        .bg-system-red { background-color: #FF453A; color: #FFFFFF; }
        .bg-system-orange { background-color: #FF9500; color: #FFFFFF; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans">

    <div id="pressProgress"></div>
    <div id="toast" class="fixed top-28 left-1/2 -translate-x-1/2 bg-white/95 text-black px-6 py-4 rounded-full text-base font-bold opacity-0 pointer-events-none transition-opacity duration-300 z-[60] shadow-xl whitespace-nowrap"></div>

    <div class="app-container">
        <div class="tab-bar">
            <div id="tabDraw" class="tab-item active" onclick="switchTab('draw')">作図</div>
            <div id="tabHistory" class="tab-item" onclick="switchTab('history')">保存済み</div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div id="drawView" class="tab-view active flex flex-col flex-1 overflow-hidden">
                <header class="p-2 border-b border-white/5">
                    <div class="flex justify-center w-full mb-2">
                        <div id="areaBox" class="bg-system-indigo text-white px-8 py-2 rounded-2xl flex items-baseline gap-2.5 shadow-lg">
                            <span class="text-[14px] font-black opacity-70">面積</span>
                            <span id="areaDisplay" class="text-3xl font-black tabular-nums tracking-tighter">--.--</span>
                            <span class="text-[14px] font-bold opacity-70">m²</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between gap-1 px-1">
                        <div class="flex gap-1">
                            <button type="button" id="undoBtn" class="header-btn bg-system-gray text-white btn-tap">戻る</button>
                            <button type="button" id="fitBtn" class="header-btn bg-system-orange text-white btn-tap hidden">全体</button>
                        </div>
                        <div class="flex gap-1">
                            <button type="button" id="resetBtn" class="header-btn bg-system-red btn-tap">リセット</button>
                        </div>
                    </div>
                </header>

                <div class="bg-[#C7C7CC] border-b border-black/10 px-3 py-1.5 flex items-center gap-3 shadow-inner">
                    <div class="flex items-center shrink-0">
                        <svg width="46" height="32" viewBox="0 0 60 40" class="text-[#5E5CE6]">
                            <path d="M6 22 L46 22 L46 2" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M6 22 L46 2" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="5,4" stroke-linecap="round"/>
                            <text x="26" y="38" font-size="14" text-anchor="middle" font-weight="800" fill="currentColor">100</text>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <input type="text" id="slopeInput" placeholder="勾配(mm)" class="w-full h-9 rounded-lg text-base px-3 font-bold text-black bg-white border-none focus:ring-1 focus:ring-black">
                    </div>
                    <div class="flex items-center justify-center min-w-[65px] bg-white h-9 rounded-lg border border-black/5 shadow-sm px-1">
                        <span id="slopeResult" class="text-sm font-black text-black tabular-nums">0.0°</span>
                    </div>
                </div>

                <div class="bg-[#1C1C1E] border-b border-white/10 px-3 py-2 flex gap-2 z-40">
                    <button type="button" id="executeBtn" class="flex-[3] h-11 bg-system-indigo text-white font-black rounded-xl shadow-lg btn-tap flex items-center justify-center gap-2 text-base">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5l10 -10"/></svg>
                        作図 更新
                    </button>
                    <button type="button" id="exportBtn" class="flex-[1] h-11 bg-system-orange text-white font-black rounded-xl shadow-lg btn-tap text-base">
                        保存
                    </button>
                </div>

                <div class="canvas-area">
                    <div id="gridBg"></div>
                    <canvas id="canvas"></canvas>
                </div>
                
                <div style="height: var(--safe-bottom); background: #1C1C1E;"></div>
            </div>

            <div id="historyView" class="tab-view scrollbar-hide flex-1" style="display:none;">
                <div id="historyList" class="flex flex-col"></div>
            </div>
        </div>
    </div>

    <!-- モーダル -->
    <div id="inputModal" class="modal px-4">
        <div class="bg-[#1C1C1E] rounded-[2rem] w-full max-w-sm shadow-2xl border border-white/10 overflow-hidden">
            <div class="p-4 flex flex-col gap-2.5">
                <h2 id="modalTitle" class="text-xl font-black text-center text-white mb-0.5">設定</h2>
                <div class="border-2 border-[#5E5CE6] rounded-2xl h-[3.6rem] flex items-center justify-center relative bg-[#1C1C1E]">
                    <div id="fakeInputCursor" class="text-white h-[2.8rem] min-w-[4rem] px-3 rounded-xl flex items-center justify-center font-black text-4xl tabular-nums transition-colors">
                        0.00
                    </div>
                    <span class="absolute right-5 text-white/30 font-black text-xl" id="modalUnit">m</span>
                </div>
                <div id="quickAngle" class="hidden grid grid-cols-3 gap-2">
                    <button type="button" id="setQuick90" class="py-1.5 bg-[#2C2C2E] text-white rounded-xl font-black text-base btn-tap">90°</button>
                    <button type="button" id="setQuick270" class="py-1.5 bg-[#2C2C2E] text-white rounded-xl font-black text-base btn-tap">270°</button>
                    <button type="button" id="setQuick45" class="py-1.5 bg-[#2C2C2E] text-white rounded-xl font-black text-base btn-tap">45°</button>
                </div>
                <div class="grid grid-cols-4 gap-1.5">
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="7">7</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="8">8</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="9">9</button>
                    <button type="button" id="numpadBS" class="bg-[#48484A] text-white rounded-xl h-[3.1rem] flex items-center justify-center btn-tap">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0 -2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
                    </button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="4">4</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="5">5</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="6">6</button>
                    <button type="button" id="cancelModal" class="bg-[#48484A] text-white rounded-xl h-[3.1rem] font-bold text-[13px] btn-tap">キャンセル</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="1">1</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="2">2</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="3">3</button>
                    <button type="button" id="saveBtn" class="bg-[#5E5CE6] text-white rounded-2xl font-black text-lg btn-tap row-span-2 shadow-lg h-[6.8rem]">適用</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="0">0</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val="00">00</button>
                    <button type="button" class="numpad-btn bg-[#2C2C2E] text-white rounded-xl h-[3.1rem] font-bold text-2xl btn-tap" data-val=".">.</button>
                </div>
                <div id="edgeInfo" class="hidden border border-white/10 p-3 rounded-xl">
                    <div class="flex justify-between items-center mb-2 border-b border-white/10 pb-1.5">
                        <div class="text-[14px] text-[#5E5CE6] font-bold">勾配と高低差</div>
                        <div class="text-[14px] font-bold text-white bg-black/40 px-2.5 py-0.5 rounded-lg" id="edgeAngle">0.0°</div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <div class="text-[14px] text-[#8E8E93] font-bold mb-0.5">水平100mm当り</div>
                            <div class="text-base font-black text-white flex items-end gap-1"><span class="text-[#5E5CE6] text-[20px] leading-none" id="edgeSlopeH">0.0</span><span class="text-[14px] text-white/40 mb-0.5">mm</span></div>
                        </div>
                        <div>
                            <div class="text-[14px] text-[#8E8E93] font-bold mb-0.5">区間高低差</div>
                            <div class="text-base font-black text-white flex items-end gap-1"><span class="text-[#5E5CE6] text-[20px] leading-none" id="edgeTotalDrop">0</span><span class="text-[14px] text-white/40 mb-0.5">mm</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'area_calc_data_v46';
        const LONG_PRESS_DURATION = 450; 
        const BASE_DOT_PITCH = 22.4; 

        let canvas, ctx, areaEl, inputModal, fitBtn, slopeInput, slopeResult, exportBtn, gridBg, pressProgress;
        let points = [], manualLengths = {}, fixedAngles = {}, isClosed = false, selectedIdx = -1, activeMode = 'edge';
        let ppx = BASE_DOT_PITCH; 

        let cameraX = 0, cameraY = 0, zoom = 1.0, startRawPos = {x: 0, y: 0}, lastRawPos = {x: 0, y: 0}, hasMoved = false;
        let globalBaseAngle = 0, globalIsCW = true, initialPinchDist = null, initialZoom = 1, initialPinchCenter = null;
        let actionHistory = [], savedData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentInputValue = "0.00", isFirstInput = true, isPanning = false;
        let pressTimer = null, longPressTriggered = false, targetVertexIdx = null, targetEdgeIdx = null;

        function persistData() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData)); } catch(e) {} }
        function showToast(msg) { const toast = document.getElementById('toast'); if (!toast) return; toast.innerText = msg; toast.style.opacity = '1'; setTimeout(() => { toast.style.opacity = '0'; }, 2000); }
        function getRawCoords(e) { const rect = canvas.getBoundingClientRect(); const t = (e.touches && e.touches.length > 0) ? e.touches[0] : e; return { x: t.clientX - rect.left, y: t.clientY - rect.top }; }
        function w2s(w) { return { x: w.x * zoom + cameraX, y: w.y * zoom + cameraY }; }
        function s2w(s) { return { x: (s.x - cameraX) / zoom, y: (s.y - cameraY) / zoom }; }
        function distToSegment(p, v, w) {
            const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2); if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = Math.max(0, Math.min(1, ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }
        function saveState() { const state = { points: JSON.parse(JSON.stringify(points)), manualLengths: {...manualLengths}, fixedAngles: {...fixedAngles}, isClosed, ppx, globalBaseAngle, globalIsCW }; actionHistory.push(state); if (actionHistory.length > 50) actionHistory.shift(); }
        function undo() { if (actionHistory.length === 0) return; const state = actionHistory.pop(); points = state.points; manualLengths = state.manualLengths; fixedAngles = state.fixedAngles; isClosed = state.isClosed; ppx = state.ppx; globalBaseAngle = state.globalBaseAngle; globalIsCW = state.globalIsCW; draw(); }
        function resize() { if (!canvas) return; const rect = canvas.parentElement.getBoundingClientRect(); canvas.width = rect.width; canvas.height = rect.height; draw(); }

        function calculateTheoreticalArea() {
            if (points.length < 3) return 0;
            let logical = [{x: 0, y: 0}]; let curAngle = 0;
            for (let i = 0; i < points.length - 1; i++) {
                let len = manualLengths[i] !== undefined ? manualLengths[i] : (Math.hypot(points[i+1].x - points[i].x, points[i+1].y - points[i].y) / ppx);
                logical.push({ x: logical[i].x + len * Math.cos(curAngle), y: logical[i].y + len * Math.sin(curAngle) });
                if (i < points.length - 2) {
                    let deg = fixedAngles[i+1];
                    if (deg === undefined) {
                        const a1 = Math.atan2(points[i+1].y-points[i].y, points[i+1].x-points[i].x), a2 = Math.atan2(points[i+2].y-points[i+1].y, points[i+2].x-points[i+1].x);
                        let turn = a2 - a1; while(turn < -Math.PI) turn += Math.PI*2; while(turn > Math.PI) turn -= Math.PI*2; curAngle += turn;
                    } else { curAngle += (globalIsCW ? (180 - deg) * Math.PI / 180 : -(180 - deg) * Math.PI / 180); }
                }
            }
            let area = 0;
            for (let i = 0; i < logical.length; i++) { const p1 = logical[i], p2 = logical[(i + 1) % logical.length]; area += p1.x * p2.y - p2.x * p1.y; }
            return Math.abs(area / 2);
        }

        function rebuildGeometry() {
            if (points.length < 3 || !isClosed) return;
            const startAnchor = { x: points[0].x, y: points[0].y };
            let logical = [{x: 0, y: 0}]; let curAngle = 0;
            for (let i = 0; i < points.length - 1; i++) {
                let len = manualLengths[i] !== undefined ? manualLengths[i] : (Math.hypot(points[i+1].x-points[i].x, points[i+1].y-points[i].y) / ppx);
                logical.push({ x: logical[i].x + len * Math.cos(curAngle), y: logical[i].y + len * Math.sin(curAngle) });
                if (i < points.length - 2) {
                    if (fixedAngles[i+1] !== undefined) { curAngle += (globalIsCW ? (180 - fixedAngles[i+1]) * Math.PI / 180 : -(180 - fixedAngles[i+1]) * Math.PI / 180); }
                    else { const a1 = Math.atan2(points[i+1].y-points[i].y, points[i+1].x-points[i].x), a2 = Math.atan2(points[i+2].y-points[i+1].y, points[i+2].x-points[i+1].x); let t = a2-a1; while(t < -Math.PI) t += Math.PI*2; while(t > Math.PI) t -= Math.PI*2; curAngle += t; }
                }
            }
            const rot = globalBaseAngle - Math.atan2(logical[1].y - logical[0].y, logical[1].x - logical[0].x);
            for (let i = 0; i < logical.length; i++) { const p = logical[i]; points[i] = { x: (p.x * Math.cos(rot) - p.y * Math.sin(rot)) * ppx + startAnchor.x, y: (p.x * Math.sin(rot) + p.y * Math.cos(rot)) * ppx + startAnchor.y }; }
            areaEl.innerText = calculateTheoreticalArea().toFixed(2);
        }

        // ★全体フィット機能の修正
        function fitView() {
            if (points.length === 0) return;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            points.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); });
            const pad = 60;
            const w = maxX - minX || 100, h = maxY - minY || 100;
            zoom = Math.min((canvas.width - pad*2) / w, (canvas.height - pad*2) / h);
            cameraX = canvas.width / 2 - ((minX + maxX) / 2) * zoom;
            cameraY = canvas.height / 2 - ((minY + maxY) / 2) * zoom;
            draw();
        }

        function draw() {
            if (!ctx) return; ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gridBg) { const s = BASE_DOT_PITCH * zoom; gridBg.style.backgroundSize = `${s}px ${s}px`; gridBg.style.backgroundPosition = `${cameraX}px ${cameraY}px`; }
            if (points.length === 0) return;
            if (isClosed) {
                ctx.beginPath(); ctx.moveTo(w2s(points[0]).x, w2s(points[0]).y);
                for (let i = 1; i < points.length; i++) ctx.lineTo(w2s(points[i]).x, w2s(points[i]).y);
                ctx.closePath(); ctx.fillStyle = 'rgba(94, 92, 230, 0.1)'; ctx.fill();
            }
            const limit = isClosed ? points.length : points.length - 1;
            for (let i = 0; i < limit; i++) {
                const p1 = w2s(points[i]), p2 = w2s(points[(i + 1) % points.length]), isAuto = isClosed && i === points.length - 1;
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineWidth = 6; ctx.lineCap = 'round';
                if (isAuto) { ctx.setLineDash([8, 8]); ctx.strokeStyle = '#3b82f6'; } else { ctx.setLineDash([]); ctx.strokeStyle = manualLengths[i] !== undefined ? '#FFFFFF' : '#8E8E93'; }
                ctx.stroke();
            }
            ctx.setLineDash([]);
            points.forEach((p_world, i) => { if (isClosed) {
                const prev = points[(i-1+points.length)%points.length], curr = points[i], next = points[(i+1)%points.length];
                const aIn = Math.atan2(curr.y-prev.y, curr.x-prev.x), aOut = Math.atan2(next.y-curr.y, next.x-curr.x);
                let turn = aOut - aIn; while(turn < -Math.PI) turn += Math.PI*2; while(turn > Math.PI) turn -= Math.PI*2;
                let actualDeg = globalIsCW ? (180-turn*180/Math.PI) : (180+turn*180/Math.PI); while(actualDeg <= 0) actualDeg += 360; while(actualDeg > 360) actualDeg -= 360;
                const isFixed = fixedAngles[i] !== undefined, label = `${isFixed ? fixedAngles[i] : Math.round(actualDeg*10)/10}°`;
                ctx.font = 'bold 12px sans-serif'; const tw = ctx.measureText(label).width;
                const pCurrS = w2s(curr), pPrevS = w2s(prev), pNextS = w2s(next);
                const a1 = Math.atan2(pPrevS.y - pCurrS.y, pPrevS.x - pCurrS.x), a2 = Math.atan2(pNextS.y - pCurrS.y, pNextS.x - pCurrS.x);
                let diff = a2 - a1; while(diff <= -Math.PI) diff += Math.PI * 2; while(diff > Math.PI) diff -= Math.PI * 2;
                let bisectorAngle = a1 + diff / 2; if (globalIsCW) { if (diff > 0) bisectorAngle += Math.PI; } else { if (diff < 0) bisectorAngle += Math.PI; }
                if (actualDeg > 180) bisectorAngle += Math.PI;
                const tx = pCurrS.x + Math.cos(bisectorAngle)*42, ty = pCurrS.y + Math.sin(bisectorAngle)*42;
                ctx.fillStyle = 'rgba(28, 28, 30, 0.9)'; ctx.beginPath(); ctx.roundRect(tx - tw/2 - 5, ty - 10, tw + 10, 20, 5); ctx.fill();
                ctx.fillStyle = isFixed ? '#FF453A' : '#8E8E93'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(label, tx, ty);
            }});
            points.forEach((p_world, i) => { const p = w2s(p_world); ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI * 2); ctx.fillStyle = (i === 0) ? '#FFFFFF' : '#1C1C1E'; ctx.fill(); ctx.strokeStyle = '#5E5CE6'; ctx.lineWidth = 3; ctx.stroke(); });
            for (let i = 0; i < limit; i++) {
                const p1 = w2s(points[i]), p2 = w2s(points[(i + 1) % points.length]), isAuto = isClosed && i === points.length - 1, midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
                const d = Math.hypot(points[(i+1)%points.length].x - points[i].x, points[(i+1)%points.length].y - points[i].y), val = manualLengths[i] !== undefined ? manualLengths[i] : (d / ppx), label = `${val.toFixed(2)}m`;
                ctx.font = 'bold 14px ui-monospace, monospace'; const tw = ctx.measureText(label).width;
                ctx.fillStyle = isAuto ? '#3b82f6' : (manualLengths[i] !== undefined ? '#FFFFFF' : 'rgba(142,142,147,0.9)');
                ctx.beginPath(); ctx.roundRect(midX - tw/2 - 9, midY - 13, tw + 18, 26, 6); ctx.fill();
                ctx.fillStyle = (manualLengths[i] !== undefined) ? '#000000' : '#FFFFFF'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(label, midX, midY);
            }
            if (isClosed) fitBtn.classList.remove('hidden'); else fitBtn.classList.add('hidden');
        }

        function handleStart(e) {
            const raw = getRawCoords(e); startRawPos = {x: raw.x, y: raw.y}; lastRawPos = raw; hasMoved = false; longPressTriggered = false; isPanning = false;
            if (e.target.id === 'canvas' && e.cancelable) e.preventDefault();
            if (!isClosed) { saveState(); const world = s2w(raw); const snapped = {x: Math.round(world.x), y: Math.round(world.y)}; if (points.length >= 3 && Math.hypot(raw.x - w2s(points[0]).x, raw.y - w2s(points[0]).y) < 50) { finalizeDrawing(); } else { points.push(snapped); draw(); } return; }
            for (let i = 0; i < points.length; i++) { 
                const p1 = w2s(points[i]), p2 = w2s(points[(i+1)%points.length]); const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
                if (Math.hypot(raw.x - mx, raw.y - my) < 35) { targetEdgeIdx = i; return; }
            }
            const vIdx = points.findIndex(p => Math.hypot(raw.x - w2s(p).x, raw.y - w2s(p).y) < 30);
            if (vIdx !== -1) {
                targetVertexIdx = vIdx; pressProgress.style.opacity = '1'; let start = Date.now();
                pressTimer = setInterval(() => {
                    let p = Math.min(100, ((Date.now() - start) / LONG_PRESS_DURATION) * 100); pressProgress.style.width = p + '%';
                    if (Date.now() - start >= LONG_PRESS_DURATION) { clearInterval(pressTimer); pressTimer = null; longPressTriggered = true; }
                }, 20);
                return;
            }
            for (let i = 0; i < points.length; i++) { if (distToSegment(raw, w2s(points[i]), w2s(points[(i+1)%points.length])) < 25) { targetEdgeIdx = i; return; } }
            // どこにもヒットしなければパン（移動）開始
            isPanning = true;
        }

        function handleMove(e) {
            const raw = getRawCoords(e);
            if (Math.hypot(raw.x - startRawPos.x, raw.y - startRawPos.y) > 10) {
                hasMoved = true; if (pressTimer) { clearInterval(pressTimer); pressTimer = null; pressProgress.style.opacity = '0'; }
            }
            // ★移動（パン）処理
            if (isPanning) {
                cameraX += raw.x - lastRawPos.x; cameraY += raw.y - lastRawPos.y;
                lastRawPos = raw; draw();
            }
        }

        function handleEnd() {
            if (pressTimer) { clearInterval(pressTimer); pressTimer = null; }
            pressProgress.style.opacity = '0'; setTimeout(() => { if (!pressTimer) pressProgress.style.width = '0'; }, 200);
            if (isClosed && !hasMoved) {
                if (longPressTriggered && targetVertexIdx !== null) { activeMode = 'angle'; selectedIdx = targetVertexIdx; openModal(); } 
                else if (targetEdgeIdx !== null) { activeMode = 'edge'; selectedIdx = targetEdgeIdx; openModal(); }
            }
            targetVertexIdx = null; targetEdgeIdx = null; isPanning = false; draw();
        }

        function finalizeDrawing() { saveState(); isClosed = true; globalBaseAngle = Math.atan2(points[1].y - points[0].y, points[1].x - points[0].x); let s = 0; for(let i = 0; i < points.length; i++) s += points[i].x * points[(i+1)%points.length].y - points[(i+1)%points.length].x * points[i].y; globalIsCW = s > 0; draw(); }

        function openModal() {
            document.getElementById('quickAngle').classList.toggle('hidden', activeMode === 'edge'); 
            document.getElementById('modalTitle').innerText = activeMode === 'edge' ? "寸法の入力" : "角度の入力";
            const getA = (idx) => {
                const prev = points[(idx-1+points.length)%points.length], curr = points[idx], next = points[(idx+1)%points.length];
                const aIn = Math.atan2(curr.y-prev.y, curr.x-prev.x), aOut = Math.atan2(next.y-curr.y, next.x-curr.x);
                let turn = aOut - aIn; while(turn < -Math.PI) turn += Math.PI*2; while(turn > Math.PI) turn -= Math.PI*2;
                let actualDeg = globalIsCW ? (180-turn*180/Math.PI) : (180+turn*180/Math.PI); while(actualDeg <= 0) actualDeg += 360; while(actualDeg > 360) actualDeg -= 360; return Math.round(actualDeg*10)/10;
            };
            let val = activeMode === 'edge' ? manualLengths[selectedIdx] : fixedAngles[selectedIdx];
            if (!val && activeMode === 'edge') val = (Math.hypot(points[(selectedIdx+1)%points.length].x-points[selectedIdx].x, points[(selectedIdx+1)%points.length].y-points[selectedIdx].y)/ppx).toFixed(2);
            else if (!val && isClosed && activeMode === 'angle') val = getA(selectedIdx);
            
            const edgeInfo = document.getElementById('edgeInfo'); let showEdgeInfo = false;
            if (activeMode === 'edge' && isClosed) {
                const p1 = points[selectedIdx], p2 = points[(selectedIdx+1)%points.length], dx = p2.x-p1.x, dy = p2.y-p1.y, cos = Math.cos(-globalBaseAngle), sin = Math.sin(-globalBaseAngle), ldx = dx*cos-dy*sin, ldy = dx*sin+dy*cos;
                let relDeg = Math.abs(Math.atan2(ldy, ldx)*180/Math.PI)%180; if (relDeg > 90) relDeg = 180-relDeg;
                if (relDeg >= 0.5 && relDeg <= 89.5) {
                    showEdgeInfo = true; document.getElementById('edgeAngle').innerText = relDeg.toFixed(1) + '°';
                    const currentL = parseFloat(val) || 0;
                    if (relDeg <= 45) { const h = 100 * Math.tan(relDeg * Math.PI / 180); document.getElementById('edgeSlopeH').innerText = h.toFixed(1); document.getElementById('edgeTotalDrop').innerText = Math.round(currentL * Math.sin(relDeg * Math.PI / 180) * 1000); } 
                    else { const w = 100 / Math.tan(relDeg * Math.PI / 180); document.getElementById('edgeSlopeH').innerText = w.toFixed(1); document.getElementById('edgeTotalDrop').innerText = Math.round(currentL * Math.cos(relDeg * Math.PI / 180) * 1000); }
                }
            }
            if (showEdgeInfo) edgeInfo.classList.remove('hidden'); else edgeInfo.classList.add('hidden');
            currentInputValue = String(val || ''); isFirstInput = true; updateModalDisplay(); inputModal.classList.add('active'); 
        }

        window.onload = function() {
            canvas = document.getElementById('canvas'); ctx = canvas.getContext('2d'); areaEl = document.getElementById('areaDisplay'); inputModal = document.getElementById('inputModal'); fitBtn = document.getElementById('fitBtn'); slopeInput = document.getElementById('slopeInput'); slopeResult = document.getElementById('slopeResult'); exportBtn = document.getElementById('exportBtn'); gridBg = document.getElementById('gridBg'); pressProgress = document.getElementById('pressProgress');
            slopeInput.oninput = () => { const val = parseFloat(slopeInput.value); if (!isNaN(val)) { const deg = Math.atan(val / 100) * 180 / Math.PI; slopeResult.innerText = deg.toFixed(1) + '°'; } else { slopeResult.innerText = '0.0°'; } };
            document.querySelectorAll('.numpad-btn').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const val = btn.getAttribute('data-val'); if (isFirstInput) { currentInputValue = val; isFirstInput = false; } else { if (val === '.' && currentInputValue.includes('.')) return; if (currentInputValue === '0' && val !== '.') currentInputValue = val; else currentInputValue += val; } updateModalDisplay(); }; });
            document.getElementById('numpadBS').onclick = (e) => { e.stopPropagation(); if (isFirstInput) { currentInputValue = ""; isFirstInput = false; } else { currentInputValue = currentInputValue.slice(0, -1); } updateModalDisplay(); };
            document.getElementById('saveBtn').onclick = (e) => { e.stopPropagation(); saveState(); const val = parseFloat(currentInputValue); if (activeMode === 'edge') { if (!isNaN(val) && val > 0) manualLengths[selectedIdx] = val; else delete manualLengths[selectedIdx]; } else { if (!isNaN(val) && val >= 0) fixedAngles[selectedIdx] = val; else delete fixedAngles[selectedIdx]; } inputModal.classList.remove('active'); draw(); };
            document.getElementById('cancelModal').onclick = (e) => { e.stopPropagation(); inputModal.classList.remove('active'); draw(); };
            exportBtn.onclick = () => { if (points.length < 3 || !isClosed) { showToast("図形を閉じてから保存してください"); return; } const dataUrl = canvas.toDataURL("image/png"); savedData.push({ img: dataUrl, area: areaEl.innerText, time: new Date().toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }), memo: '', points: JSON.parse(JSON.stringify(points)), manualLengths: {...manualLengths}, fixedAngles: {...fixedAngles}, isClosed, ppx, globalBaseAngle, globalIsCW, slopeValue: slopeInput.value, cameraX, cameraY, zoom }); persistData(); showToast("保存しました"); };
            document.getElementById('undoBtn').onclick = undo;
            // ★全体ボタン
            document.getElementById('fitBtn').onclick = fitView;
            document.getElementById('resetBtn').onclick = () => { saveState(); points = []; manualLengths = {}; fixedAngles = {}; isClosed = false; cameraX=0; cameraY=0; zoom=1; slopeInput.value=""; slopeInput.oninput(); areaEl.innerText="--.--"; draw(); };
            document.getElementById('setQuick90').onclick = () => { currentInputValue = "90"; isFirstInput = false; updateModalDisplay(); document.getElementById('saveBtn').click(); };
            document.getElementById('setQuick270').onclick = () => { currentInputValue = "270"; isFirstInput = false; updateModalDisplay(); document.getElementById('saveBtn').click(); };
            document.getElementById('setQuick45').onclick = () => { currentInputValue = "45"; isFirstInput = false; updateModalDisplay(); document.getElementById('saveBtn').click(); };
            
            document.getElementById('executeBtn').onclick = () => {
                if (!isClosed) { showToast("図形を閉じてから実行してください"); return; }
                saveState(); const N = points.length;
                let firstManualIdx = -1;
                for(let i = 0; i < N; i++) { if(manualLengths[i] !== undefined) { firstManualIdx = i; break; } }
                if(firstManualIdx !== -1) { const d_screen = Math.hypot(points[(firstManualIdx+1)%N].x - points[firstManualIdx].x, points[(firstManualIdx+1)%N].y - points[firstManualIdx].y); ppx = d_screen / manualLengths[firstManualIdx]; }
                for (let i = 1; i < N - 1; i++) {
                    if (fixedAngles[i] === undefined) {
                        const prev = points[(i-1+N)%N], curr = points[i], next = points[(i+1)%N];
                        const aIn = Math.atan2(curr.y-prev.y, curr.x-prev.x), aOut = Math.atan2(next.y-curr.y, next.x-curr.x);
                        let turn = aOut - aIn; while(turn < -Math.PI) turn += Math.PI*2; while(turn > Math.PI) turn -= Math.PI*2;
                        let actualDeg = globalIsCW ? (180-turn*180/Math.PI) : (180+turn*180/Math.PI); while(actualDeg <= 0) actualDeg += 360; while(actualDeg > 360) actualDeg -= 360;
                        if (Math.abs(actualDeg - 90) <= 15) fixedAngles[i] = 90; else if (Math.abs(actualDeg - 270) <= 15) fixedAngles[i] = 270; else fixedAngles[i] = Math.round(actualDeg * 10) / 10;
                    }
                }
                rebuildGeometry(); draw(); showToast("面積を確定しました");
            };

            let isTouching = false;
            canvas.addEventListener('mousedown', (e) => { if (isTouching) return; handleStart(e); });
            window.addEventListener('mousemove', (e) => { if (isTouching) return; handleMove(e); });
            window.addEventListener('mouseup', (e) => { if (isTouching) return; handleEnd(); });

            canvas.addEventListener('touchstart', (e) => { 
                isTouching = true; 
                if (e.touches.length === 2) { 
                    isPanning = false; targetVertexIdx = null; targetEdgeIdx = null;
                    initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); 
                    initialZoom = zoom;
                    const r = canvas.getBoundingClientRect(); initialPinchCenter = { x: (e.touches[0].clientX+e.touches[1].clientX)/2 - r.left, y: (e.touches[0].clientY+e.touches[1].clientY)/2 - r.top }; 
                    if (e.cancelable) e.preventDefault(); return; 
                }
                handleStart(e); 
            }, {passive:false});
            window.addEventListener('touchmove', (e) => { 
                if (isTouching && e.touches.length === 2 && initialPinchDist) { 
                    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY), nz = Math.max(0.1, Math.min(10, initialZoom * (d / initialPinchDist))), r = nz / zoom;
                    cameraX = initialPinchCenter.x - (initialPinchCenter.x - cameraX) * r; cameraY = initialPinchCenter.y - (initialPinchCenter.y - cameraY) * r; zoom = nz; draw(); if (e.cancelable) e.preventDefault(); return; 
                }
                handleMove(e); 
            }, {passive:false});
            window.addEventListener('touchend', (e) => { handleEnd(); isTouching = false; });
            window.addEventListener('resize', resize); resize(); setTimeout(resize, 200);
        };

        function switchTab(tab) { document.querySelectorAll('.tab-view').forEach(v => v.style.display = 'none'); document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active')); if (tab === 'draw') { document.getElementById('drawView').style.display = 'flex'; document.getElementById('tabDraw').classList.add('active'); resize(); } else { document.getElementById('historyView').style.display = 'block'; document.getElementById('tabHistory').classList.add('active'); renderHistory(); } }
        function loadHistory(idx) { const data = savedData[idx]; if (!data || !data.points) { showToast("復元用データがありません"); return; } saveState(); points = JSON.parse(JSON.stringify(data.points)); manualLengths = {...data.manualLengths}; fixedAngles = {...data.fixedAngles}; isClosed = data.isClosed; ppx = data.ppx; globalBaseAngle = data.globalBaseAngle; globalIsCW = data.globalIsCW; slopeInput.value = data.slopeValue || ""; cameraX = data.cameraX || 0; cameraY = data.cameraY || 0; zoom = data.zoom || 1.0; slopeInput.oninput(); switchTab('draw'); draw(); showToast("データを読み込みました"); }
        function renderHistory() { const list = document.getElementById('historyList'); if (savedData.length === 0) { list.innerHTML = `<div class="text-center text-[#8E8E93] py-20 font-bold">まだ保存されたデータはありません</div>`; return; } list.innerHTML = savedData.slice().reverse().map((data, idx) => { const actualIdx = savedData.length - 1 - idx; return `<div class="history-card"><input type="text" class="memo-input" placeholder="メモを入力..." value="${data.memo || ''}" onchange="updateMemo(${actualIdx}, this.value)"><div class="flex justify-between items-center mb-2 px-1"><span class="text-[#8E8E93] text-xs font-bold">${data.time}</span><span class="text-white font-black text-lg">${data.area} m²</span></div><div onclick="loadHistory(${actualIdx})" class="active:opacity-70 transition-opacity"><img src="${data.img}" class="w-full rounded-xl border border-white/10 mb-3 bg-[#000]"><div class="text-center text-[11px] text-[#5E5CE6] font-bold mb-2 uppercase tracking-widest">タップで編集を再開</div></div><div class="flex gap-2"><button onclick="deleteHistory(${actualIdx})" class="flex-1 py-3 bg-[#2C2C2E] text-[#FF453A] rounded-xl font-bold text-sm btn-tap">削除</button></div></div>`; }).join(''); }
        function updateMemo(idx, val) { savedData[idx].memo = val; persistData(); showToast("メモを保存しました"); }
        function deleteHistory(idx) { if(confirm("このデータを削除してもよろしいですか？")) { savedData.splice(idx, 1); persistData(); renderHistory(); showToast("削除しました"); } }
        function updateModalDisplay() { const displayEl = document.getElementById('fakeInputCursor'); displayEl.innerText = currentInputValue || "0"; if (isFirstInput) { displayEl.classList.remove('bg-[#5E5CE6]'); displayEl.classList.add('text-[#5E5CE6]'); displayEl.classList.remove('text-white'); } else { displayEl.classList.remove('text-[#5E5CE6]'); displayEl.classList.add('text-white'); } }
    </script>
